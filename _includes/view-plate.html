<h1 id="heading">Photomicrograph</h1>

<p id="intro">
  This page displays a photomicrographic plate from the Field Notes Journal archive.
</p>

<p class="muted" id="meta"></p>

<figure class="report-figure">
  <div id="media-wrap" class="report-image-wrap">
    <img
      id="plate-img"
      class="responsive"
      alt="Photomicrographic plate"
      style="display: none;"
    />

    <video
      id="plate-video"
      class="responsive"
      controls
      playsinline
      preload="metadata"
      style="display: none;"
    >
      Sorry — your browser does not support embedded video.
    </video>
  </div>

  <figcaption class="report-caption">
    Photomicrograph from the Field Notes Journal observational archive.
  </figcaption>

  <div class="download-block">
    <a id="download-link" class="download-btn" href="#" download>
      ⬇ Download full-size plate
    </a>
    <p class="download-note" id="download-note">
      Downloads the original file where the browser allows it.
    </p>
  </div>
</figure>

<script>
  window.SITE_BASEURL = {{ site.baseurl | jsonify }};
</script>
<script src="{{ '/assets/js/plate-viewer.js' | relative_url }}"></script>
