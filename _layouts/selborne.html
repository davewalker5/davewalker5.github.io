---
layout: default
---

<article class="notebook-entry">
  <header class="notebook-entry-header">
    <p class="notebook-kicker">Selborne Field Guide Entry</p>
    <h1>{{ page.title }}</h1>

    <div class="notebook-taxonomy">
      <span class="taxonomy-label">Category:</span>
      <a class="taxonomy-link" href="{{ '/wildlife/selborne/by-category/' | relative_url }}#{{ page.category }}">{{ page.category }}</a>
    </p>
  </header>

  <div class="notebook-entry-body">
    {% if page.images %}
      {% include image-block.html images=page.images assets="/assets/images/selborne/" %}
    {% endif %}

    {{ content }}
  </div>
</article>
